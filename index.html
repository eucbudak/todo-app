<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emre'nin İş Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH EKRANI -->
  <div class="auth-wrapper" id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/>
          <path d="M8 14l2 2 4-4"/>
        </svg>
      </div>
      <h1 class="auth-title">Emre'nin İş Listesi</h1>

      <!-- Sekmeler -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Giriş Yap</button>
        <button class="auth-tab" data-tab="register">Kayıt Ol</button>
      </div>

      <!-- Mesaj kutusu -->
      <div class="auth-message" id="auth-message" style="display:none;"></div>

      <!-- Giriş formu -->
      <form id="login-form" class="auth-form">
        <div class="field">
          <label for="login-email">E-posta</label>
          <input type="email" id="login-email" placeholder="ornek@mail.com" required />
        </div>
        <div class="field">
          <label for="login-password">Şifre</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Giriş Yap</button>
      </form>

      <!-- Kayıt formu -->
      <form id="register-form" class="auth-form" style="display:none;">
        <div class="field">
          <label for="reg-email">E-posta</label>
          <input type="email" id="reg-email" placeholder="ornek@mail.com" required />
        </div>
        <div class="field">
          <label for="reg-password">Şifre <span class="hint">(en az 6 karakter)</span></label>
          <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" class="btn-primary" id="register-btn">Kayıt Ol</button>
      </form>
    </div>
  </div>

  <!-- ONAY BEKLENİYOR EKRANI -->
  <div class="auth-wrapper" id="confirm-screen" style="display:none;">
    <div class="auth-card confirm-card">
      <div class="confirm-icon">📧</div>
      <h2>E-postanı onayla</h2>
      <p id="confirm-email-text">Kayıt için gönderilen onay bağlantısına tıkla.</p>
      <button class="btn-secondary" id="resend-btn">Tekrar gönder</button>
      <button class="btn-ghost" id="back-to-login">Giriş ekranına dön</button>
    </div>
  </div>

  <!-- UYGULAMA EKRANI -->
  <div id="app-screen" style="display:none;">
    <div class="container">
      <header>
        <div class="header-top">
          <div>
            <h1>Emre'nin İş Listesi</h1>
            <p class="subtitle" id="summary">0 görev var</p>
          </div>
          <button class="logout-btn" id="logout-btn" title="Çıkış yap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
        <p class="user-email" id="user-email"></p>
      </header>

      <div class="input-area">
        <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off" />
        <button id="add-btn">Ekle</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tümü</button>
        <button class="filter-btn" data-filter="active">Aktif</button>
        <button class="filter-btn" data-filter="completed">Tamamlanan</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="footer" id="footer" style="display:none;">
        <span id="remaining"></span>
        <button id="clear-btn">Tamamlananları Sil</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
